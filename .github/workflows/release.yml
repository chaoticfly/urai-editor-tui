name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # ── Read version from source; skip if that tag already exists ───────────────
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      skip: ${{ steps.read.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from main.go
        id: read
        run: |
          VERSION=$(grep -oP '(?<=const version = ").*(?=")' prose/cmd/urai/main.go)
          TAG="v${VERSION}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version ${TAG} detected — releasing."
          fi

  # ── Build all platforms ──────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: urai-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            asset: urai-linux-arm64.tar.gz
          - goos: darwin
            goarch: arm64
            asset: urai-darwin-arm64.tar.gz
          - goos: windows
            goarch: amd64
            asset: urai-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: prose/go.mod

      - name: Build
        working-directory: prose
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          VERSION="${VERSION#v}"
          BIN=urai
          [ "${{ matrix.goos }}" = "windows" ] && BIN=urai.exe
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "../dist/${BIN}" ./cmd/urai/

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: tar -czf "${{ matrix.asset }}" -C dist urai README.md LICENSE

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: zip "${{ matrix.asset }}" dist/urai.exe README.md LICENSE

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── Tag, publish release, attach binaries ───────────────────────────────────
  release:
    name: Tag and publish
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum urai-*.tar.gz urai-*.zip > checksums.txt

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check.outputs.version }}"
          git push origin "${{ needs.check.outputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          generate_release_notes: true
          files: |
            urai-linux-amd64.tar.gz
            urai-linux-arm64.tar.gz
            urai-darwin-arm64.tar.gz
            urai-windows-amd64.zip
            checksums.txt
